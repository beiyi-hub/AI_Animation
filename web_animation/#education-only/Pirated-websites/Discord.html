<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Teknium & NetworkNoob - AI-Agent Discussion</title>
    <link href="https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --discord-blurple: #5865f2;
            --discord-dark: #1e1f22;
            --discord-darker: #18191c;
            --discord-sidebar: #2b2d31;
            --discord-channel: #313338;
            --discord-message: #383a40;
            --discord-input: #383a40;
            --discord-hover: #404249;
            --discord-active: #4f545c;
            --discord-mention: #5865f2;
            --discord-green: #23a559;
            --discord-red: #ed4245;
            --discord-yellow: #f0b232;
            --discord-text: #dbdee1;
            --discord-text-muted: #b9bbbe;
            --discord-text-secondary: #949ba4;
            --discord-border: #3f4147;
            --discord-online: #23a559;
            --discord-idle: #f0b232;
            --discord-dnd: #ed4245;
            --discord-offline: #747f8d;
        }

        body {
            font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--discord-dark);
            color: var(--discord-text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-wrapper {
            display: flex;
            height: 100vh;
        }

        /* ========== Server Sidebar ========== */
        .server-sidebar {
            width: 72px;
            background: var(--discord-darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            border-right: 2px solid transparent;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--discord-blurple);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .server-icon::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.2s ease;
        }

        .server-icon:hover::before {
            background: rgba(255, 255, 255, 0.1);
        }

        .server-icon.home {
            background: var(--discord-blurple);
        }

        .server-icon.home.active {
            border-radius: 16px;
        }

        .server-icon img {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
        }

        .server-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .server-divider {
            width: 32px;
            height: 2px;
            background: var(--discord-active);
            border-radius: 1px;
            margin: 4px 0;
        }

        .add-server-btn {
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .add-server-btn:hover .server-icon {
            background: var(--discord-green);
        }

        .server-unread-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: var(--discord-green);
            border-radius: 50%;
            border: 3px solid var(--discord-darker);
        }

        /* ========== Channel Sidebar ========== */
        .channel-sidebar {
            width: 240px;
            background: var(--discord-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--discord-darker);
        }

        .channel-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--discord-darker);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .channel-header:hover {
            background: var(--discord-hover);
        }

        .channel-header h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--discord-text);
        }

        .channel-header svg {
            width: 18px;
            height: 18px;
            color: var(--discord-text-muted);
        }

        .channel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
        }

        .channel-content::-webkit-scrollbar {
            width: 4px;
        }

        .channel-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .channel-content::-webkit-scrollbar-thumb {
            background: var(--discord-active);
            border-radius: 2px;
        }

        .channel-section {
            margin-bottom: 24px;
        }

        .channel-section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .channel-section-title h3 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--discord-text-secondary);
        }

        .channel-section-title svg {
            width: 12px;
            height: 12px;
            color: var(--discord-text-secondary);
            transition: transform 0.2s ease;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--discord-text-muted);
        }

        .channel-item:hover {
            background: var(--discord-hover);
            color: var(--discord-text);
        }

        .channel-item.active {
            background: var(--discord-message);
            color: var(--discord-text);
        }

        .channel-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .channel-item span {
            font-size: 15px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-item.hashtag {
            color: var(--discord-text-secondary);
        }

        .channel-item .channel-hash {
            font-size: 18px;
            font-weight: 400;
            color: var(--discord-text-secondary);
            margin-right: 4px;
        }

        .channel-item .unread-indicator {
            width: 8px;
            height: 8px;
            background: var(--discord-text);
            border-radius: 50%;
            margin-left: auto;
        }

        .user-panel {
            background: var(--discord-darker);
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--discord-blurple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            position: relative;
        }

        .user-avatar-small img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-status-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 3px solid var(--discord-darker);
        }

        .user-status-indicator.online {
            background: var(--discord-online);
        }

        .user-status-indicator.idle {
            background: var(--discord-idle);
        }

        .user-status-indicator.dnd {
            background: var(--discord-dnd);
        }

        .user-info {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--discord-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status-text {
            font-size: 11px;
            color: var(--discord-text-secondary);
        }

        .user-controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--discord-text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .control-btn:hover {
            background: var(--discord-hover);
            color: var(--discord-text);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ========== Chat Area ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--discord-dark);
            position: relative;
        }

        .chat-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--discord-darker);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
        }

        .chat-header svg {
            width: 24px;
            height: 24px;
            color: var(--discord-text-secondary);
        }

        .chat-header-divider {
            width: 1px;
            height: 24px;
            background: var(--discord-active);
            margin: 0 8px;
        }

        .chat-header h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--discord-text);
        }

        .chat-header-desc {
            font-size: 12px;
            color: var(--discord-text-secondary);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-actions {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }

        .header-btn {
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--discord-text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .header-btn:hover {
            color: var(--discord-text);
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ========== Messages Area ========== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--discord-active);
            border-radius: 4px;
        }

        .message-group {
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 4px 16px;
            border-radius: 4px;
            transition: background 0.1s ease;
            cursor: pointer;
        }

        .message:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9b59b6, #3498db);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: var(--discord-online);
            border-radius: 50%;
            border: 3px solid var(--discord-dark);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 2px;
        }

        .message-author {
            font-size: 15px;
            font-weight: 600;
            color: var(--discord-text);
            cursor: pointer;
        }

        .message-author:hover {
            text-decoration: underline;
        }

        .message-timestamp {
            font-size: 11px;
            color: var(--discord-text-secondary);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            color: var(--discord-text);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-text code {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.85em;
        }

        .message-text pre {
            background: #2e3136;
            padding: 12px;
            border-radius: 4px;
            margin: 8px 0;
            overflow-x: auto;
        }

        .message-text pre code {
            background: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .message-embed {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid var(--discord-blurple);
            border-radius: 4px;
            padding: 12px;
            margin: 8px 0;
            max-width: 600px;
        }

        .message-embed-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--discord-blurple);
            margin-bottom: 8px;
        }

        .message-embed-content {
            font-size: 13px;
            line-height: 1.5;
            color: var(--discord-text);
        }

        .message-reactions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .reaction {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--discord-message);
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 12px;
            font-weight: 500;
        }

        .reaction:hover {
            background: var(--discord-hover);
        }

        .reaction.own {
            background: var(--discord-blurple);
            color: white;
        }

        .reaction-emoji {
            font-size: 14px;
        }

        .reaction-count {
            color: var(--discord-text-secondary);
        }

        .reaction.own .reaction-count {
            color: white;
        }

        .message-actions {
            display: none;
            gap: 4px;
            margin-top: 4px;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .message-action {
            width: 24px;
            height: 24px;
            background: var(--discord-message);
            border: none;
            border-radius: 50%;
            color: var(--discord-text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .message-action:hover {
            background: var(--discord-hover);
            color: var(--discord-text);
        }

        .message-action svg {
            width: 14px;
            height: 14px;
        }

        /* ========== Chat Input ========== */
        .chat-input-container {
            padding: 0 16px 24px;
        }

        .chat-input-wrapper {
            background: var(--discord-message);
            border-radius: 8px;
            padding: 0 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .chat-input-wrapper:focus-within {
            box-shadow: 0 0 0 2px var(--discord-blurple);
        }

        .chat-input-btn {
            width: 40px;
            height: 44px;
            background: transparent;
            border: none;
            color: var(--discord-text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s ease;
        }

        .chat-input-btn:hover {
            color: var(--discord-text);
        }

        .chat-input-btn svg {
            width: 24px;
            height: 24px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--discord-text);
            font-size: 15px;
            padding: 12px 0;
            resize: none;
            max-height: 200px;
            line-height: 1.4;
        }

        .chat-input::placeholder {
            color: var(--discord-text-secondary);
        }

        .chat-input-actions {
            display: flex;
            gap: 4px;
            padding-bottom: 8px;
        }

        /* ========== Typing Indicator ========== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--discord-text-secondary);
        }

        .typing-users {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--discord-text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes typingBounce {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ========== Animations ========== */
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            animation: messageSlideIn 0.2s ease;
        }

        /* ========== Responsive Design ========== */
        @media (max-width: 1024px) {
            .server-sidebar {
                width: 56px;
            }

            .server-icon {
                width: 40px;
                height: 40px;
            }

            .channel-sidebar {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .server-sidebar {
                width: 0;
                overflow: hidden;
            }

            .channel-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 1000;
                transition: left 0.3s ease;
            }

            .channel-sidebar.open {
                left: 0;
            }

            .mobile-toggle {
                display: block;
            }
        }
    </style>
</head>

        <!-- Channel Sidebar -->
        <div class="channel-sidebar">

                        <span class="channel-hash">#</span>
                        <span>research-papers</span>
                    </div>
                    <div class="channel-item hashtag">
                        <span class="channel-hash">#</span>
                        <span>code-help</span>
                    </div>
                </div>

                <div class="channel-section">
                    <div class="channel-section-title">
                        <h3>社区</h3>
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 10l5 5 5-5z"/>
                        </svg>
                    </div>
                    <div class="channel-item">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>

            return content

                .replace(/`([^`]+)`/g, '<code>$1</code>')

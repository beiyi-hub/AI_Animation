<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天演示 - 先核实再点链接</title>
    <style>
        /* 全局样式 + 微信风格变量 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        :root {
            --wx-bg: #ebebeb; /* 微信聊天背景 */
            --wx-header: #07c160; /* 微信顶部绿 */
            --wx-other-bubble: #fff; /* 对方气泡白 */
            --wx-self-bubble: #d9fdd3; /* 自己气泡绿 */
            --wx-text: #333; /* 主文字色 */
            --wx-link: #0084ff; /* 链接蓝色 */
            --wx-gray: #999; /* 浅灰文字 */
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
        }

        /* 微信聊天内容区背景 */
        .wx-chat-content {
            flex: 1;
            background-color: var(--wx-bg);
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 微信聊天窗口容器（仿真手机尺寸） */
        .wx-chat-container {
            width: 100%;
            max-width: 420px;
            height: 700px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 微信顶部聊天栏 */
        .wx-chat-header {
            height: 50px;
            background-color: var(--wx-header);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: relative;
        }
        .wx-back-icon {
            font-size: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
        .wx-chat-name {
            font-size: 16px;
            font-weight: 500;
        }

        /* 微信聊天内容区 */
        .wx-chat-content {
            flex: 1;
            background-color: var(--wx-bg);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* 时间分割线 */
        .chat-time {
            align-self: center;
            background-color: rgba(0, 0, 0, 0.1);
            color: var(--wx-gray);
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        /* 聊天消息通用样式 */
        .chat-item {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        /* 对方消息（左） */
        .chat-other {
            align-self: flex-start;
            flex-direction: row;
        }
        /* 自己消息（右） */
        .chat-self {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        /* 头像 */
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .chat-avatar.other {
            background-color: #f0f0f0;
        }
        .chat-avatar.self {
            background-color: #f0f0f0;
        }
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 气泡 */
        .chat-bubble {
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 14px;
            color: var(--wx-text);
            position: relative;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            animation: bubbleSlide 0.3s ease;
        }
        .chat-other .chat-bubble {
            background-color: var(--wx-other-bubble);
            border-top-left-radius: 4px;
        }
        .chat-self .chat-bubble {
            background-color: var(--wx-self-bubble);
            border-top-right-radius: 4px;
        }
        /* 消息状态 */
        .chat-status {
            font-size: 11px;
            color: var(--wx-gray);
            margin-top: 4px;
            text-align: right;
        }
        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bubbleSlide {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        /* 链接样式（仿微信） */
        .chat-link {
            color: var(--wx-link);
            text-decoration: underline;
            cursor: pointer;
        }
        .chat-link:hover {
            color: #0066cc;
        }

        /* 微信底部输入区 */
        .wx-chat-input {
            height: 60px;
            background-color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-top: 1px solid #eee;
        }
        .wx-input-box {
            flex: 1;
            height: 38px;
            background-color: #f1f1f1;
            border-radius: 19px;
            padding: 0 15px;
            border: none;
            outline: none;
            font-size: 14px;
        }
        .wx-send-btn {
            width: 60px;
            height: 38px;
            background-color: var(--wx-header);
            color: #fff;
            border: none;
            border-radius: 19px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 风险提示弹窗 */
        .risk-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 350px;
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            z-index: 999;
            display: none;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #e63946;
            margin-bottom: 10px;
        }
        .modal-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }
        .modal-btn {
            width: 100%;
            height: 38px;
            background-color: #e63946;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 防钓鱼知识提示框 */
        .security-tips {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background-color: #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            z-index: 998;
            border-left: 4px solid var(--wx-header);
        }
        .tips-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--wx-header);
            margin-bottom: 10px;
        }
        .tips-content {
            font-size: 12px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 12px;
        }
        .tips-content p {
            margin-bottom: 6px;
        }
        .tips-content strong {
            color: var(--wx-text);
        }
        .tips-close {
            width: 100%;
            height: 30px;
            background-color: #f1f1f1;
            color: var(--wx-text);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .tips-close:hover {
            background-color: #e0e0e0;
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .security-tips {
                width: 240px;
                padding: 12px;
                bottom: 15px;
                right: 15px;
            }
            .tips-title {
                font-size: 13px;
            }
            .tips-content {
                font-size: 11px;
            }
            .tips-close {
                height: 28px;
                font-size: 11px;
            }
        }

        /* 滚动条美化（仿微信） */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 2px;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .wx-chat-container {
                max-width: 100%;
                height: 90vh;
            }
            .chat-item {
                max-width: 85%;
            }
            .chat-avatar {
                width: 36px;
                height: 36px;
                font-size: 13px;
            }
            .chat-bubble {
                font-size: 13px;
                padding: 9px 13px;
            }
        }

        /* 手机设备调整 */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            .wx-chat-container {
                height: 95vh;
                border-radius: 8px;
            }
            .wx-chat-header {
                height: 45px;
                padding: 0 12px;
            }
            .wx-chat-name {
                font-size: 15px;
            }
            .wx-chat-content {
                padding: 12px;
                gap: 12px;
            }
            .chat-item {
                max-width: 90%;
            }
            .chat-avatar {
                width: 34px;
                height: 34px;
                font-size: 12px;
                margin: 0 8px;
            }
            .chat-bubble {
                font-size: 12px;
                padding: 8px 12px;
            }
            .wx-chat-input {
                height: 55px;
                padding: 0 12px;
            }
            .wx-input-box {
                height: 34px;
                padding: 0 12px;
                font-size: 13px;
            }
            .wx-send-btn {
                width: 50px;
                height: 34px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 微信聊天窗口 -->
    <div class="wx-chat-container">
        <!-- 顶部聊天栏 -->
        <div class="wx-chat-header">
            <div class="wx-back-icon">←</div>
            <div class="wx-chat-name">赤川鹤鸣_Channel</div>
        </div>

        <!-- 聊天内容区 -->
        <div class="wx-chat-content" id="chatContent">
            <!-- 消息动态生成 -->
        </div>

        <!-- 底部输入区 -->
        <div class="wx-chat-input">
            <input type="text" class="wx-input-box" id="messageInput" placeholder="输入消息...">
            <button class="wx-send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <!-- 链接风险提示弹窗 -->
    <div class="risk-modal" id="riskModal">
        <div class="modal-title">⚠️ 安全提醒</div>
        <div class="modal-desc">
            未核实对方身份前，切勿点击陌生链接！<br><br>
            该链接可能是钓鱼链接，点击后会窃取你的微信信息、银行卡号等敏感数据，甚至导致手机中毒。
        </div>
        <button class="modal-btn" id="closeModal">我已知晓</button>
    </div>

    <!-- 防钓鱼知识提示框 -->
    <div class="security-tips" id="securityTips">
        <div class="tips-title">🔒 防钓鱼小知识</div>
        <div class="tips-content">
            <p>✅ <strong>三不铁律：</strong>不轻易点陌生链接、不随便填敏感信息、不下载非官方APP</p>
            <p>✅ <strong>核实身份：</strong>收到朋友发送的链接，先通过电话或其他方式核实身份</p>
            <p>✅ <strong>查看域名：</strong>链接前查看域名是否为官方域名，注意数字代替字母的情况</p>
            <p>✅ <strong>应用商店安全：</strong>只从官方应用商店下载APP，避免点击聊天中的下载链接</p>
            <p>✅ <strong>检查应用信息：</strong>下载前查看应用评分、评论、开发者信息和权限要求</p>
            <p>✅ <strong>保护密码：</strong>定期更换密码，开启两步验证</p>
        </div>
        <button class="tips-close" id="closeTips">关闭</button>
    </div>

    <script>
        // 获取核心DOM元素
        const chatContent = document.getElementById('chatContent');
        const riskModal = document.getElementById('riskModal');
        const closeModal = document.getElementById('closeModal');
        const securityTips = document.getElementById('securityTips');
        const closeTips = document.getElementById('closeTips');

        // 聊天消息列表
        const chatMessages = [
            {
                type: 'time',
                content: '今天 14:30'
            },
            {
                type: 'other', // 对方消息
                content: '牛牛要炸了！'
            },
            {
                type: 'other',
                content: '<span class="chat-link" id="fakeLink">https://niuniu-888.com</span>'
            },
            {
                type: 'self', // 自己消息
                content: '你刚才给我发链接了吗？'
            },
            {
                type: 'other',
                content: '没有啊，我的微信账号可能被盗了！'
            },
            {
                type: 'self',
                content: '我就知道！刚才的链接肯定是钓鱼链接，我没有点击。'
            },
            {
                type: 'other',
                content: '太谢谢你了！我已经改密码了，应该没问题了。'
            },
            {
                type: 'self',
                content: '以后遇到这种情况，一定要先核实对方身份，再决定是否点击链接。'
            },
            {
                type: 'time',
                content: '今天 15:20'
            },
            {
                type: 'other',
                content: '嘿，我发现了一个超好用的APP，你一定要试试！'
            },
            {
                type: 'other',
                content: '<span class="chat-link" id="appStoreLink">https://app-store-free.com/download</span>'
            },
            {
                type: 'self',
                content: '这个APP是在正规应用商店下载的吗？'
            },
            {
                type: 'other',
                content: '不用那么麻烦，直接点击链接就能下载，还有独家功能哦！'
            },
            {
                type: 'self',
                content: '不行，非正规渠道下载的APP很可能是钓鱼应用，会窃取个人信息的。我还是去正规应用商店搜索一下吧。'
            }
        ];

        // 动态渲染聊天消息（模拟真实聊天节奏）
        function renderChatMessages() {
            let index = 0;
            const renderNext = () => {
                if (index >= chatMessages.length) return;
                
                const msg = chatMessages[index];
                
                if (msg.type === 'time') {
                    // 渲染时间分割线
                    const timeItem = document.createElement('div');
                    timeItem.className = 'chat-time';
                    timeItem.textContent = msg.content;
                    chatContent.appendChild(timeItem);
                } else {
                    // 渲染聊天消息
                    const chatItem = document.createElement('div');
                    chatItem.className = `chat-item chat-${msg.type}`;
                    
                    const avatarClass = msg.type === 'other' ? 'other' : 'self';
                    const avatarSrc = msg.type === 'other' ? 'PNG/xc.png' : 'PNG/xb.png';
                    
                    chatItem.innerHTML = `
                        <div class="chat-avatar ${avatarClass}">
                            <img src="${avatarSrc}" alt="avatar">
                        </div>
                        <div>
                            <div class="chat-bubble">${msg.content}</div>
                            ${msg.type === 'self' ? '<div class="chat-status">已读</div>' : ''}
                        </div>
                    `;
                    
                    chatContent.appendChild(chatItem);
                }
                
                // 滚动到底部
                chatContent.scrollTop = chatContent.scrollHeight;
                
                index++;
                // 延迟显示下一条消息（模拟聊天间隔）
                setTimeout(renderNext, 1500);
            };
            
            // 启动渲染
            renderNext();
        }

        // 发送消息功能
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (message) {
                // 创建新消息元素
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item chat-self';
                
                chatItem.innerHTML = `
                    <div class="chat-avatar self">
                        <img src="PNG/xb.png" alt="avatar">
                    </div>
                    <div>
                        <div class="chat-bubble">${message}</div>
                        <div class="chat-status">已发送</div>
                    </div>
                `;
                
                // 添加到聊天内容
                chatContent.appendChild(chatItem);
                // 滚动到底部
                chatContent.scrollTop = chatContent.scrollHeight;
                
                // 清空输入框
                messageInput.value = '';
                
                // 模拟对方回复
                setTimeout(() => {
                    const replyItem = document.createElement('div');
                    replyItem.className = 'chat-item chat-other';
                    
                    replyItem.innerHTML = `
                        <div class="chat-avatar other">
                            <img src="PNG/xc.png" alt="avatar">
                        </div>
                        <div class="chat-bubble">好的，我知道了！</div>
                    `;
                    
                    chatContent.appendChild(replyItem);
                    // 滚动到底部
                    chatContent.scrollTop = chatContent.scrollHeight;
                }, 1000);
            }
        }

        // 页面加载后渲染消息
        window.addEventListener('load', () => {
            renderChatMessages();
            
            // 绑定链接点击事件（延迟绑定，确保元素已生成）
            setTimeout(() => {
                const fakeLink = document.getElementById('fakeLink');
                const appStoreLink = document.getElementById('appStoreLink');
                
                if (fakeLink) {
                    fakeLink.addEventListener('click', () => {
                        riskModal.style.display = 'block';
                    });
                }
                
                if (appStoreLink) {
                    appStoreLink.addEventListener('click', () => {
                        riskModal.style.display = 'block';
                    });
                }
            }, 2000);
            
            // 绑定发送按钮点击事件
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.addEventListener('click', sendMessage);
            
            // 绑定输入框回车键事件
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });

        // 关闭风险提示弹窗
        closeModal.addEventListener('click', () => {
            riskModal.style.display = 'none';
        });

        // 关闭防钓鱼知识提示框
        closeTips.addEventListener('click', () => {
            securityTips.style.display = 'none';
        });
    </script>
</body>
</html>

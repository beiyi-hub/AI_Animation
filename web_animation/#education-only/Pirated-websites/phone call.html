                    <li>✅ 客服不会索要密码或验证码</li>
                    <li>✅ 不会要求转账或购买产品</li>
                    <li>✅ 可疑电话请挂断后重拨10086核实</li>
                </ul>
                <button class="close-tips" onclick="closeSecurityTips()">关闭</button>
            </div>
            
            <!-- 拨号界面 -->
            <div class="dial-interface" id="dial-interface">
                <!-- 号码显示 -->
                <div class="number-display">
                    <div class="display-text" id="phone-number"></div>
                    <div class="hint-text">请输入10086后点击拨号键</div>
                </div>

                <!-- 数字键盘 -->
                <div class="dial-pad">
                    <button class="dial-btn" onclick="appendNumber('1')">1</button>
                    <button class="dial-btn" onclick="appendNumber('2')">2</button>
                    <button class="dial-btn" onclick="appendNumber('3')">3</button>
                    <button class="dial-btn" onclick="appendNumber('4')">4</button>
                    <button class="dial-btn" onclick="appendNumber('5')">5</button>
                    <button class="dial-btn" onclick="appendNumber('6')">6</button>
                    <button class="dial-btn" onclick="appendNumber('7')">7</button>
                    <button class="dial-btn" onclick="appendNumber('8')">8</button>
                    <button class="dial-btn" onclick="appendNumber('9')">9</button>
                    <button class="dial-btn functional" onclick="appendNumber('*')">*</button>
                    <button class="dial-btn" onclick="appendNumber('0')">0</button>
                    <button class="dial-btn functional" onclick="appendNumber('#')">#</button>
                </div>

                <!-- 拨号按钮 -->
                <div class="call-control">
                    <button id="dial-btn" onclick="startCall()">📞</button>
                </div>
            </div>

            <!-- 通话中界面 -->
            <div class="calling-interface" id="calling-interface">
                <!-- 通话头部 -->
                <div class="call-header">
                    <div class="call-number">10086</div>
                    <div class="call-state" id="call-state">正在拨号...</div>
                    <div class="call-timer" id="call-timer">00:00</div>
                </div>

                <!-- 语音波形 -->
                <div class="voice-wave" id="voice-wave">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>

                <!-- 语音提示内容 -->
                <div class="voice-prompt" id="prompt-content">
                    正在接通中国移动10086客服热线，请稍候...
                </div>

                <!-- 操作按钮 -->
                <div class="keypad-actions">
                    <button class="action-btn" onclick="pressKey('1')">按1 - 话费查询</button>
                    <button class="action-btn" onclick="pressKey('2')">按2 - 流量查询</button>
                    <button class="action-btn" onclick="pressKey('3')">按3 - 业务办理</button>
                    <button class="action-btn" onclick="pressKey('4')">按4 - 投诉建议</button>
                    <button class="action-btn" onclick="pressKey('0')">按0 - 人工服务</button>
                    <button class="action-btn" onclick="pressKey('*')">按* - 返回菜单</button>
                    <button class="action-btn hangup" onclick="endCall()">挂断通话</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取核心元素
        const dialInterface = document.getElementById('dial-interface');
        const callingInterface = document.getElementById('calling-interface');
        const phoneNumber = document.getElementById('phone-number');
        const callState = document.getElementById('call-state');
        const callTimer = document.getElementById('call-timer');
        const promptContent = document.getElementById('prompt-content');
        const voiceWave = document.getElementById('voice-wave');
        const currentTime = document.getElementById('current-time');
        const securityTipsCard = document.getElementById('security-tips-card');

        // 更新当前时间
        setInterval(() => {
            const now = new Date();
            currentTime.textContent = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            });
        }, 1000);

        // 初始号码设为空，需要用户手动输入
        let number = '';
        let timerInterval = null;
        let callSeconds = 0;

        // 关闭防钓鱼教育卡片
        function closeSecurityTips() {
            securityTipsCard.style.opacity = '0';
            securityTipsCard.style.transform = 'translate(-50%, -50%) scale(0.9)';
            setTimeout(() => {
                securityTipsCard.style.display = 'none';
            }, 300);
        }

        // 追加数字到号码
        function appendNumber(num) {
            number += num;
            phoneNumber.textContent = number;
        }

        // 开始通话
        function startCall() {
            // 仅允许拨打10086
            if (phoneNumber.textContent !== '10086') {
                alert('本演示仅支持拨打10086查询话费');
                return;
            }

            // 隐藏防钓鱼教育卡片
            closeSecurityTips();

            // 切换到通话中界面
            dialInterface.style.display = 'none';
            callingInterface.style.display = 'flex';
            // 添加动画效果
            setTimeout(() => {
                callingInterface.classList.add('active');
            }, 100);

            // 初始化通话计时
            callSeconds = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                callSeconds++;
                const minutes = Math.floor(callSeconds / 60).toString().padStart(2, '0');
                const seconds = (callSeconds % 60).toString().padStart(2, '0');
                callTimer.textContent = `${minutes}:${seconds}`;
            }, 1000);

            // 模拟10086通话流程（更真实的语音导航）
            const voicePrompts = [
                { state: '正在拨号...', prompt: '正在接通中国移动10086客服热线，请稍候...', delay: 0 },
                { state: '呼叫中', prompt: '嘟...嘟...嘟...', delay: 3000 },
                { state: '已接通', prompt: '欢迎致电中国移动10086，普通话服务请按1，For English service please press 2...', delay: 6000 },
                { state: '请按键选择', prompt: '您已选择普通话服务，话费余额查询请按1，套餐余量查询请按2，业务办理请按3，人工服务请按0，投诉建议请按4...', delay: 9000 }
            ];

            // 分步播放语音提示
            voicePrompts.forEach((item, index) => {
                setTimeout(() => {
                    callState.textContent = item.state;
                    promptContent.textContent = item.prompt;
                    // 启动/停止语音波形（模拟语音播放）
                    voiceWave.style.opacity = item.state !== '正在拨号...' ? '1' : '0.5';
                }, item.delay);
            });
        }

        // 模拟按键操作
        function pressKey(key) {
            // 暂停波形动画（模拟按键输入）
            voiceWave.style.opacity = '0.3';
            
            // 模拟按键音效（视觉反馈）
            const keySound = document.createElement('div');
            keySound.style.position = 'fixed';
            keySound.style.top = '50%';
            keySound.style.left = '50%';
            keySound.style.transform = 'translate(-50%, -50%)';
            keySound.style.background = 'linear-gradient(135deg, rgba(0, 122, 255, 0.2) 0%, rgba(0, 86, 179, 0.3) 100%)';
            keySound.style.color = '#007aff';
            keySound.style.padding = '20px 40px';
            keySound.style.borderRadius = '10px';
            keySound.style.fontSize = '24px';
            keySound.style.zIndex = '9999';
            keySound.style.transition = 'all 0.5s ease';
            keySound.style.boxShadow = '0 4px 12px rgba(0, 122, 255, 0.3)';
            keySound.style.border = '1px solid rgba(0, 122, 255, 0.3)';
            keySound.textContent = `按键：${key}`;
            document.body.appendChild(keySound);
            
            // 按键动画效果
            keySound.style.animation = 'keyPress 0.5s ease-in-out';
            
            setTimeout(() => {
                keySound.style.opacity = '0';
                keySound.style.transform = 'translate(-50%, -50%) scale(0.8)';
                setTimeout(() => {
                    document.body.removeChild(keySound);
                }, 500);
            }, 500);
            
            if (key === '1') {
                // 话费查询流程
                callState.textContent = '查询话费中';
                promptContent.textContent = '正在为您查询话费余额，请稍候...';
                
                setTimeout(() => {
                    const expireDate = new Date();
                    expireDate.setDate(expireDate.getDate() + 7);
                    
                    promptContent.textContent = `
【话费查询结果】
您好！截至${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString().slice(0,5)}，您的账户信息如下：
• 可用余额：68.52 元
• 赠送余额：12.80 元（有效期至${expireDate.toLocaleDateString()}）
• 本月已产生费用：45.30 元

温馨提示：您的话费余额充足，无需立即充值。

如需充值，请按1；返回上一级菜单，请按*；结束服务，请挂机。
                    `;
                    callState.textContent = '话费查询完成';
                    voiceWave.style.opacity = '1';
                }, 1800);
            } else if (key === '2') {
                // 流量查询
                callState.textContent = '查询流量中';
                promptContent.textContent = '正在为您查询流量使用情况，请稍候...';
                
                setTimeout(() => {
                    promptContent.textContent = `
【流量查询结果】
您好！截至当前，您的流量使用情况如下：
• 通用流量：已用4.8GB/总计10GB（剩余5.2GB）
• 定向流量：已用2.1GB/总计5GB（剩余2.9GB）
• 夜间流量：未使用/总计2GB（剩余2GB）

温馨提示：您的流量剩余充足，可放心使用。

如需办理流量套餐，请按1；返回上一级菜单，请按*；结束服务，请挂机。
                    `;
                    callState.textContent = '流量查询完成';
                    voiceWave.style.opacity = '1';
                }, 1800);
            } else if (key === '3') {
                // 业务办理
                callState.textContent = '业务办理';
                promptContent.textContent = '正在为您转接业务办理菜单，请稍候...';
                
                setTimeout(() => {
                    promptContent.textContent = `
【业务办理菜单】
流量套餐办理请按1
语音套餐办理请按2
短信套餐办理请按3
增值业务办理请按4
返回上一级菜单请按*`;
                    callState.textContent = '业务办理菜单';
                    voiceWave.style.opacity = '1';
                }, 1500);
            } else if (key === '4') {
                // 投诉建议
                callState.textContent = '投诉建议';
                promptContent.textContent = '正在为您转接投诉建议菜单，请稍候...';
                
                setTimeout(() => {
                    promptContent.textContent = `
【投诉建议菜单】
网络问题投诉请按1
服务质量投诉请按2
业务咨询请按3
建议反馈请按4
返回上一级菜单请按*`;
                    callState.textContent = '投诉建议菜单';
                    voiceWave.style.opacity = '1';
                }, 1500);
            } else if (key === '0') {
                // 人工服务
                callState.textContent = '转接人工中';
                promptContent.textContent = '正在为您转接人工客服，请不要挂断电话...\n当前排队人数：8人，预计等待时间：3分钟';
                
                setTimeout(() => {
                    promptContent.textContent = `
【人工服务提示】
您好！人工客服线路繁忙，建议您通过以下方式快速办理业务：
1. 中国移动APP：可查询/办理所有业务
2. 短信营业厅：发送10086到10086获取菜单
3. 微信公众号：中国移动10086

如需继续等待人工服务，请保持通话状态。

【防钓鱼安全提示】
• 中国移动客服不会通过电话要求您提供密码或验证码
• 不会要求您进行转账操作或购买理财产品
• 不会以任何理由要求您在ATM机上进行操作
• 如遇可疑电话，请挂断后直接拨打10086核实
• 保护个人信息，谨防诈骗
                    `;
                    callState.textContent = '人工服务排队中';
                    voiceWave.style.opacity = '1';
                }, 3000);
            } else if (key === '*') {
                // 返回上一级菜单
                callState.textContent = '返回菜单';
                promptContent.textContent = '正在返回主菜单，请稍候...';
                
                setTimeout(() => {
                    promptContent.textContent = '您已选择普通话服务，话费余额查询请按1，套餐余量查询请按2，业务办理请按3，人工服务请按0，投诉建议请按4...';
                    callState.textContent = '请按键选择';
                    voiceWave.style.opacity = '1';
                }, 1000);
            }
        }

        // 结束通话
        function endCall() {
            // 停止计时
            clearInterval(timerInterval);
            
            // 移除动画效果类
            callingInterface.classList.remove('active');
            
            // 切换回拨号界面
            callingInterface.style.display = 'none';
            dialInterface.style.display = 'flex';
            
            // 重置状态
            callState.textContent = '正在拨号...';
            callTimer.textContent = '00:00';
            promptContent.textContent = '正在接通中国移动10086客服热线，请稍候...';
            voiceWave.style.opacity = '1';
            number = '';
            phoneNumber.textContent = number;
        }
    </script>
</body>
</html>

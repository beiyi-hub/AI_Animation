<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白信 - 聊天软件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ffffff',
                        secondary: '#FF69B4',
                        accent: '#8A2BE2',
                        dark: '#333333',
                        light: '#f5f5f5',
                        'secondary-light': '#FFB6C1'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .message-gradient {
                background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            }
            .recipient-gradient {
                background: linear-gradient(135deg, #fff0f3 0%, #ffe6ec 100%);
            }
            .glow {
                box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            }
            .pulse-animation {
                animation: pulse 2s infinite;
            }
            .float-animation {
                animation: float 3s ease-in-out infinite;
            }
            .ripple {
                position: relative;
                overflow: hidden;
            }
            .ripple:after {
                content: "";
                display: block;
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                pointer-events: none;
                background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
                background-repeat: no-repeat;
                background-position: 50%;
                transform: scale(10, 10);
                opacity: 0;
                transition: transform .5s, opacity 1s;
            }
            .ripple:active:after {
                transform: scale(0, 0);
                opacity: .3;
                transition: 0s;
            }
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 105, 180, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 105, 180, 0);
            }
        }
        
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        
        .file-transfer-animation {
            animation: transfer 3s forwards;
        }
        
        @keyframes transfer {
            0% {
                transform: translateX(0) scale(0.8);
                opacity: 0.5;
            }
            50% {
                transform: translateX(50px) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(100px) scale(0.8);
                opacity: 0.5;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-dark">
    <!-- 背景装饰图形 -->
    <div class="fixed top-0 right-0 w-64 h-64 bg-secondary-light/20 rounded-full -mr-32 -mt-32 blur-3xl"></div>
    <div class="fixed bottom-0 left-0 w-96 h-96 bg-accent/10 rounded-full -ml-48 -mb-48 blur-3xl"></div>
    
    <div class="container mx-auto px-4 py-8 max-w-4xl">

        
        <!-- 聊天界面 -->
        <div class="bg-primary rounded-2xl shadow-lg overflow-hidden border border-gray-100 relative">
            <!-- 顶部聊天信息 -->
            <div class="p-4 border-b border-gray-100 flex items-center space-x-3 bg-light">
                <div class="w-10 h-10 rounded-full overflow-hidden">
                    <img src="https://tiebapic.baidu.com/forum/w%3D580/sign=9c9425354ff79052ef1f47363cf3d738/137e98fb828ba61e14e39e090734970a304e5950.jpg?tbpicau=2025-09-02-05_45a8b8662bd73f933f2cae6d74da90d1" 
                         alt="浅草爱音的头像" 
                         class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="font-semibold">浅草爱音</h2>
                    <p class="text-xs text-gray-500">在线</p>
                </div>
                <div class="ml-auto flex space-x-2">
                    <button class="p-2 rounded-full hover:bg-gray-200 transition">
                        <i class="fa fa-phone text-gray-500"></i>
                    </button>
                    <button class="p-2 rounded-full hover:bg-gray-200 transition">
                        <i class="fa fa-video-camera text-gray-500"></i>
                    </button>
                    <button class="p-2 rounded-full hover:bg-gray-200 transition">
                        <i class="fa fa-ellipsis-v text-gray-500"></i>
                    </button>
                </div>
            </div>
            
            <!-- 聊天消息区域 -->
            <div class="h-[500px] overflow-y-auto p-4 space-y-6" id="chat-messages">
                <!-- 时间分割线 -->
                <div class="text-center">
                    <span class="inline-block px-3 py-1 bg-gray-100 text-gray-500 text-xs rounded-full">今天 14:30</span>
                </div>
                
                <!-- 对方消息 -->
                <div class="flex items-end space-x-2 max-w-[80%]">
                    <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0">
                        <img src="https://tiebapic.baidu.com/forum/w%3D580/sign=9c9425354ff79052ef1f47363cf3d738/137e98fb828ba61e14e39e090734970a304e5950.jpg?tbpicau=2025-09-02-05_45a8b8662bd73f933f2cae6d74da90d1" 
                             alt="浅草爱音的头像" 
                             class="w-full h-full object-cover">
                    </div>
                    <div class="recipient-gradient p-3 rounded-t-lg rounded-br-lg rounded-tl-none shadow-sm">
                        <p>你好！能把上次说的那个文件发给我吗？</p>
                    </div>
                    <span class="text-xs text-gray-400">14:31</span>
                </div>
                
                <!-- 我的消息 -->
                <div class="flex items-end justify-end space-x-2 max-w-[80%] ml-auto">
                    <span class="text-xs text-gray-400">14:32</span>
                    <div class="message-gradient p-3 rounded-t-lg rounded-bl-lg rounded-tr-none shadow-sm border border-gray-100">
                        <p>好的，我这就发给你</p>
                    </div>
                </div>
                
                <!-- 文件发送区域 -->
                <div class="flex items-end justify-end space-x-2 max-w-[80%] ml-auto" id="file-transfer">
                    <span class="text-xs text-gray-400" id="file-time">14:32</span>
                    <div class="message-gradient p-4 rounded-t-lg rounded-bl-lg rounded-tr-none shadow-sm border border-gray-100 flex items-center space-x-3 w-full">
                        <div class="bg-secondary/10 p-3 rounded-lg">
                            <i class="fa fa-file-archive-o text-secondary text-xl"></i>
                        </div>
                        <div class="flex-grow">
                            <p class="font-medium text-sm">文档资料.rar</p>
                            <div class="w-full bg-gray-200 rounded-full h-1.5 mt-1.5">
                                <div class="bg-secondary h-1.5 rounded-full transition-all duration-1000" id="progress-bar" style="width: 0%"></div>
                            </div>
                            <p class="text-xs text-gray-500 mt-1" id="progress-text">0% - 0.0MB/2.5MB</p>
                        </div>
                    </div>
                </div>
                
                <!-- 发送成功消息 -->
                <div class="flex items-end justify-end space-x-2 max-w-[80%] ml-auto hidden" id="success-message">
                    <span class="text-xs text-gray-400">14:33</span>
                    <div class="message-gradient p-3 rounded-t-lg rounded-bl-lg rounded-tr-none shadow-sm border border-gray-100 flex items-center space-x-2">
                        <i class="fa fa-check-circle text-green-500"></i>
                        <p class="text-sm">文件发送成功</p>
                    </div>
                </div>
                
                <!-- 对方接收消息 -->
                <div class="flex items-end space-x-2 max-w-[80%] hidden" id="recipient-message">
                    <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0">
                        <img src="https://tiebapic.baidu.com/forum/w%3D580/sign=9c9425354ff79052ef1f47363cf3d738/137e98fb828ba61e14e39e090734970a304e5950.jpg?tbpicau=2025-09-02-05_45a8b8662bd73f933f2cae6d74da90d1" 
                             alt="浅草爱音的头像" 
                             class="w-full h-full object-cover">
                    </div>
                    <div class="recipient-gradient p-3 rounded-t-lg rounded-br-lg rounded-tl-none shadow-sm">
                        <p>收到了，谢谢！</p>
                    </div>
                    <span class="text-xs text-gray-400">14:34</span>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="p-4 border-t border-gray-100 bg-light">
                <div class="flex items-center space-x-3">
                    <button class="p-2 rounded-full hover:bg-gray-200 transition ripple">
                        <i class="fa fa-smile-o text-gray-500"></i>
                    </button>
                    <button class="p-2 rounded-full hover:bg-gray-200 transition ripple">
                        <i class="fa fa-paperclip text-gray-500"></i>
                    </button>
                    <div class="relative flex-grow">
                        <input type="text" placeholder="输入消息..." class="w-full py-2 px-4 rounded-full bg-primary border border-gray-200 focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition">
                    </div>
                    <button class="p-3 rounded-full bg-secondary text-white hover:bg-secondary/90 transition ripple pulse-animation">
                        <i class="fa fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 装饰元素 -->
        <div class="absolute top-1/4 left-10 w-16 h-16 border border-secondary/30 rounded-full float-animation hidden md:block"></div>
        <div class="absolute bottom-1/3 right-10 w-12 h-12 border border-accent/20 rounded-full float-animation" style="animation-delay: 1s"></div>
    </div>

    <script>
        // 模拟文件上传进度
        document.addEventListener('DOMContentLoaded', function() {
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const successMessage = document.getElementById('success-message');
            const recipientMessage = document.getElementById('recipient-message');
            const chatMessages = document.getElementById('chat-messages');
            
            let progress = 0;
            const totalSize = 2.5; // MB
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress > 100) progress = 100;
                
                const currentSize = (totalSize * progress / 100).toFixed(1);
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${Math.round(progress)}% - ${currentSize}MB/${totalSize}MB`;
                
                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                if (progress === 100) {
                    clearInterval(interval);
                    
                    // 显示发送成功消息
                    setTimeout(() => {
                        successMessage.classList.remove('hidden');
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        
                        // 显示对方接收消息
                        setTimeout(() => {
                            recipientMessage.classList.remove('hidden');
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }, 1500);
                    }, 1000);
                }
            }, 300);
        });
    </script>
</body>
</html>

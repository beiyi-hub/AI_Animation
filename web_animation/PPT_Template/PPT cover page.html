<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSTM长短期记忆网络 - 首页展示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a0a1a;
            --primary-purple: #1a1a3e;
            --accent-cyan: #00d4ff;
            --accent-purple: #7b61ff;
            --accent-green: #00ff88;
            --accent-orange: #ff6b35;
            --text-light: #e8e8f0;
            --text-muted: #a0a0b8;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-dark);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
        }

        .bg-gradient-1 {
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
        }

        .bg-gradient-2 {
            bottom: -300px;
            left: -200px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
        }

        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 60px 60px;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* 头部区域 */
        header {
            padding: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-cyan);
        }

        /* 英雄区域 */
        .hero {
            padding: 60px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            min-height: calc(100vh - 100px);
            box-sizing: border-box;
        }

        .hero-content {
            position: relative;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero h1 span {
            display: block;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
            margin-top: 15px;
        }

        .hero-description {
            font-size: 1.3rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 600px;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            color: white;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        /* 视觉展示区 */
        .hero-visual {
            position: relative;
        }

        .lstm-diagram {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        /* LSTM模块背景动画 */
        .lstm-diagram::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(0, 212, 255, 0.08) 0%, 
                rgba(123, 97, 255, 0.08) 50%, 
                transparent 100%
            );
            z-index: -1;
            animation: diagramGlow 4s ease-in-out infinite alternate;
        }

        @keyframes diagramGlow {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }

        .desc-line {
            display: block;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        /* 强调样式 */
        .highlight-term {
            font-weight: 700;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            font-size: 1.1em;
        }

        .highlight-concept {
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: underline;
            text-decoration-color: var(--accent-cyan);
            text-underline-offset: 4px;
        }

        .highlight-tech {
            font-style: italic;
            font-weight: 600;
            color: var(--accent-green);
            background: rgba(0, 255, 136, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .highlight-problem {
            font-weight: 600;
            color: var(--accent-orange);
            text-decoration: wavy underline;
            text-decoration-color: var(--accent-orange);
            text-underline-offset: 4px;
        }

        .highlight-fields {
            font-weight: 600;
            background: linear-gradient(135deg, rgba(123, 97, 255, 0.2), rgba(0, 212, 255, 0.2));
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(123, 97, 255, 0.4);
            box-shadow: 0 0 15px rgba(123, 97, 255, 0.2);
        }

        .highlight-foundation {
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .diagram-title {
            text-align: center;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .diagram-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .memory-cell {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(123, 97, 255, 0.2) 100%);
            border: 2px solid var(--accent-cyan);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .memory-cell .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .memory-cell .value {
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .flow-arrow {
            color: var(--accent-purple);
            font-size: 1.5rem;
            position: relative;
        }

        .dashed-arrow {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, 
                var(--accent-purple) 0%, 
                var(--accent-purple) 50%, 
                transparent 50%, 
                transparent 100%
            );
            background-size: 15px 2px;
            position: relative;
            animation: fadeInUp 1.2s ease-out both, dashFlow 0.8s linear infinite;
        }

        .dashed-arrow::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid var(--accent-purple);
        }

        @keyframes dashFlow {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 15px 0;
            }
        }

        /* 记忆单元脉冲动画 */
        .memory-cell {
            animation: cellPulse 3s ease-in-out infinite;
        }

        .memory-cell:nth-child(1) { animation-delay: 0s; }
        .memory-cell:nth-child(3) { animation-delay: 0.5s; }
        .memory-cell:nth-child(5) { animation-delay: 1s; }
        .memory-cell:nth-child(7) { animation-delay: 1.5s; }
        .memory-cell:nth-child(9) { animation-delay: 2s; }

        @keyframes cellPulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
            }
        }

        /* 门控项闪烁动画 */
        .gate-item {
            animation: gateGlow 4s ease-in-out infinite;
        }

        .gate-item:nth-child(1) { animation-delay: 0s; }
        .gate-item:nth-child(2) { animation-delay: 1.3s; }
        .gate-item:nth-child(3) { animation-delay: 2.6s; }

        @keyframes gateGlow {
            0%, 100% {
                border-color: rgba(255, 255, 255, 0.1);
                background: rgba(255, 255, 255, 0.05);
            }
            50% {
                border-color: var(--accent-cyan);
                background: rgba(0, 212, 255, 0.1);
            }
        }

        .gates-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .gate-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .gate-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateY(-3px);
        }

        .gate-item i {
            font-size: 1.5rem;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            display: block;
        }

        .gate-item span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 特性区域 */
        .features {
            padding: 100px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-header p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.1);
        }

        .feature-card:hover::before {
            transform: scaleX(1);
        }

        .feature-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(123, 97, 255, 0.2) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .feature-icon i {
            font-size: 2rem;
            color: var(--accent-cyan);
        }

        .feature-card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .feature-card p {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-muted);
        }

        /* 应用场景 */
        .applications {
            padding: 100px 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 212, 255, 0.03) 50%, transparent 100%);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .app-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
        }

        .app-item:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: var(--accent-cyan);
            transform: translateY(-5px);
        }

        .app-item i {
            font-size: 2.5rem;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            display: block;
        }

        .app-item h4 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .app-item p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 页脚 */
        footer {
            padding: 60px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 60px;
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* 全局初始隐藏状态 */
        .bg-decoration,
        .logo,
        .badge,
        .hero h1,
        .hero h1 span,
        .desc-line,
        .lstm-diagram,
        .diagram-title,
        .memory-cell,
        .gate-item {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s ease-out both;
        }

        /* 虚线箭头单独处理初始状态 */
        .dashed-arrow {
            opacity: 0;
            transform: translateY(30px);
        }

        /* 动画时间轴分配 - 总时长10秒 */
        .bg-decoration { animation-delay: 0s; }
        .logo { animation-delay: 0.8s; }
        .badge { animation-delay: 1.6s; }
        .hero h1 { animation-delay: 2.4s; }
        .hero h1 span { animation-delay: 3.2s; }
        .desc-line:nth-child(1) { animation-delay: 4s; }
        .desc-line:nth-child(2) { animation-delay: 4.5s; }
        .desc-line:nth-child(3) { animation-delay: 5s; }
        .lstm-diagram { animation-delay: 5.6s; }
        .diagram-title { animation-delay: 6.2s; }
        
        /* 流程图元素依次入场 */
        .diagram-flow .memory-cell:nth-child(1) { animation-delay: 6.7s; }
        .diagram-flow .dashed-arrow:nth-child(2) { animation-delay: 7s; }
        .diagram-flow .memory-cell:nth-child(3) { animation-delay: 7.3s; }
        .diagram-flow .dashed-arrow:nth-child(4) { animation-delay: 7.6s; }
        .diagram-flow .memory-cell:nth-child(5) { animation-delay: 7.9s; }
        .diagram-flow .dashed-arrow:nth-child(6) { animation-delay: 8.2s; }
        .diagram-flow .memory-cell:nth-child(7) { animation-delay: 8.5s; }
        .diagram-flow .dashed-arrow:nth-child(8) { animation-delay: 8.8s; }
        .diagram-flow .memory-cell:nth-child(9) { animation-delay: 9.1s; }
        
        /* 门控项依次入场 */
        .gates-row .gate-item:nth-child(1) { animation-delay: 9.3s; }
        .gates-row .gate-item:nth-child(2) { animation-delay: 9.5s; }
        .gates-row .gate-item:nth-child(3) { animation-delay: 9.7s; }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .hero {
                grid-template-columns: 1fr;
                gap: 60px;
                padding: 60px 0;
            }

            .hero h1 {
                font-size: 3.5rem;
            }

            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .apps-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero h1 span {
                font-size: 1.2rem;
            }

            .nav-links {
                display: none;
            }

            .features-grid,
            .apps-grid {
                grid-template-columns: 1fr;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }

            .diagram-flow {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-gradient bg-gradient-1"></div>
        <div class="bg-gradient bg-gradient-2"></div>
        <div class="grid-pattern"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-network-wired"></i>
                <span>LSTM</span>
            </div>

        </header>

        <section class="hero">
            <div class="hero-content">
                <div class="badge">
                    <i class="fas fa-star"></i>
                    深度学习核心技术
                </div>
                <h1>
                    LSTM
                    <span>长短期记忆网络</span>
                </h1>
                <p class="hero-description">
                    <span class="desc-line"><span class="highlight-term">Long Short-Term Memory</span>，一种<span class="highlight-concept">特殊的循环神经网络架构</span>。</span>
                    <span class="desc-line">通过<span class="highlight-tech">独特的门控机制</span>，有效解决了传统RNN在长序列处理中的<span class="highlight-problem">梯度消失问题</span>，</span>
                    <span class="desc-line">为<span class="highlight-fields">机器翻译、语音识别、时间序列预测</span>等领域奠定了<span class="highlight-foundation">坚实基础</span>。</span>
                </p>

            </div>

            <div class="hero-visual">
                <div class="lstm-diagram">
                    <div class="diagram-title">
                        <i class="fas fa-project-diagram"></i>
                        LSTM 网络结构
                    </div>
                    <div class="diagram-flow">
                        <div class="memory-cell">
                            <span class="label">输入</span>
                            <span class="value">xₜ</span>
                        </div>
                        <div class="dashed-arrow"></div>
                        <div class="memory-cell" style="border-color: var(--accent-purple);">
                            <span class="label">遗忘门</span>
                            <span class="value" style="color: var(--accent-purple);">fₜ</span>
                        </div>
                        <div class="dashed-arrow"></div>
                        <div class="memory-cell" style="border-color: var(--accent-green);">
                            <span class="label">输入门</span>
                            <span class="value" style="color: var(--accent-green);">iₜ</span>
                        </div>
                        <div class="dashed-arrow"></div>
                        <div class="memory-cell" style="border-color: var(--accent-orange);">
                            <span class="label">输出门</span>
                            <span class="value" style="color: var(--accent-orange);">oₜ</span>
                        </div>
                        <div class="dashed-arrow"></div>
                        <div class="memory-cell">
                            <span class="label">输出</span>
                            <span class="value">hₜ</span>
                        </div>
                    </div>
                    <div class="gates-row">
                        <div class="gate-item">
                            <i class="fas fa-door-open"></i>
                            <span>遗忘门</span>
                        </div>
                        <div class="gate-item">
                            <i class="fas fa-plus-circle"></i>
                            <span>输入门</span>
                        </div>
                        <div class="gate-item">

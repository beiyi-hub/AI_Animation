<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Animation Studio</title>
  <style>
    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #111128;
      --bg-card: #16163a;
      --neon-blue: #00d4ff;
      --neon-purple: #b44aff;
      --neon-pink: #ff3ea5;
      --neon-green: #39ff9e;
      --text-primary: #e0e0f0;
      --text-secondary: #8888bb;
      --glow-blue: 0 0 20px rgba(0, 212, 255, 0.3);
      --glow-purple: 0 0 20px rgba(180, 74, 255, 0.3);
      --border-glow: 0 0 10px rgba(0, 212, 255, 0.15);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Animated Background ── */
    .bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .bg-canvas .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 20s ease-in-out infinite;
      opacity: 0.15;
    }

    .bg-canvas .orb:nth-child(1) {
      width: 600px;
      height: 600px;
      background: var(--neon-blue);
      top: -10%;
      left: -10%;
      animation-duration: 25s;
    }

    .bg-canvas .orb:nth-child(2) {
      width: 500px;
      height: 500px;
      background: var(--neon-purple);
      bottom: -10%;
      right: -10%;
      animation-duration: 20s;
      animation-delay: -5s;
    }

    .bg-canvas .orb:nth-child(3) {
      width: 300px;
      height: 300px;
      background: var(--neon-pink);
      top: 50%;
      left: 50%;
      animation-duration: 18s;
      animation-delay: -10s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(100px, -80px) scale(1.1);
      }

      50% {
        transform: translate(-60px, 120px) scale(0.9);
      }

      75% {
        transform: translate(80px, 60px) scale(1.05);
      }
    }

    /* ── Stars grid ── */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
      opacity: 0.3;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.1;
        transform: scale(0.8);
      }

      100% {
        opacity: 0.8;
        transform: scale(1.2);
      }
    }

    /* ── Container ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 60px 0 40px;
      position: relative;
      animation: fadeInDown 1s ease-out;
    }

    header .logo-icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: inline-block;
      animation: pulseGlow 3s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.3));
    }

    @keyframes pulseGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.2));
      }

      50% {
        filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.5));
      }
    }

    header h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: none;
      position: relative;
    }

    header h1::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
      border-radius: 2px;
    }

    header .subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-top: 16px;
      letter-spacing: 4px;
      font-weight: 300;
    }

    header .subtitle .emoji-deco {
      display: inline-block;
      animation: bounceEmoji 2s ease-in-out infinite;
    }

    @keyframes bounceEmoji {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    /* ── Description ── */
    .description {
      background: linear-gradient(135deg, rgba(22, 22, 58, 0.8), rgba(17, 17, 40, 0.9));
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
      animation: fadeInUp 1s ease-out 0.2s both;
      position: relative;
      overflow: hidden;
    }

    .description::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
    }

    .description p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .description p:first-child {
      color: var(--text-primary);
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    .description .stats-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--neon-blue);
    }

    .description .stats-badge span {
      font-weight: 700;
    }

    /* ── Category Section ── */
    .categories {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeInUp 1s ease-out 0.4s both;
    }

    .category {
      background: linear-gradient(135deg, rgba(22, 22, 58, 0.6), rgba(17, 17, 40, 0.7));
      border: 1px solid rgba(0, 212, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: all var(--transition);
      backdrop-filter: blur(8px);
    }

    .category:hover {
      border-color: rgba(0, 212, 255, 0.25);
      box-shadow: var(--border-glow);
      transform: translateX(4px);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
      transition: background var(--transition);
    }

    .category-header:hover {
      background: rgba(0, 212, 255, 0.03);
    }

    .category-header .left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .category-header .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.1);
      transition: var(--transition);
    }

    .category:hover .icon {
      border-color: rgba(0, 212, 255, 0.3);
    }

    .category-header .name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-header .name-en {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .category-header .count {
      font-size: 0.78rem;
      color: var(--neon-blue);
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.15);
      padding: 2px 12px;
      border-radius: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .category-header .arrow {
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .category.open .arrow {
      transform: rotate(180deg);
      color: var(--neon-blue);
    }

    /* ── File List ── */
    .file-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease;
      opacity: 0;
    }

    .category.open .file-list {
      max-height: 2000px;
      opacity: 1;
    }

    .file-list-inner {
      padding: 0 20px 16px 74px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.88rem;
      text-decoration: none;
      transition: all var(--transition);
      position: relative;
    }

    .file-item::before {
      content: '▸';
      color: var(--neon-blue);
      font-size: 0.7rem;
      opacity: 0.5;
      transition: var(--transition);
    }

    .file-item:hover {
      color: var(--text-primary);
      background: rgba(0, 212, 255, 0.05);
      padding-left: 14px;
    }

    .file-item:hover::before {
      opacity: 1;
      transform: translateX(2px);
    }

    .file-item .file-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .file-item .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Color-coded category icons ── */
    .cat-demos .icon {
      color: var(--neon-blue);
      border-color: rgba(0, 212, 255, 0.2);
    }

    .cat-ai-ml .icon {
      color: var(--neon-purple);
      border-color: rgba(180, 74, 255, 0.2);
    }

    .cat-ppt .icon {
      color: #ff6b6b;
      border-color: rgba(255, 107, 107, 0.2);
    }

    .cat-ppt2 .icon {
      color: #ffa94d;
      border-color: rgba(255, 169, 77, 0.2);
    }

    .cat-bg .icon {
      color: var(--neon-green);
      border-color: rgba(57, 255, 158, 0.2);
    }

    .cat-packet .icon {
      color: #ffd43b;
      border-color: rgba(255, 212, 59, 0.2);
    }

    .cat-dhcp .icon {
      color: #74c0fc;
      border-color: rgba(116, 192, 252, 0.2);
    }

    .cat-geometry .icon {
      color: #da77f2;
      border-color: rgba(218, 119, 242, 0.2);
    }

    .cat-experiments .icon {
      color: #f783ac;
      border-color: rgba(247, 131, 172, 0.2);
    }

    .cat-education .icon {
      color: #69db7c;
      border-color: rgba(105, 219, 124, 0.2);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 60px;
      padding: 30px 0 20px;
      border-top: 1px solid rgba(0, 212, 255, 0.06);
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    footer .github-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 30px;
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.15);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all var(--transition);
    }

    footer .github-link:hover {
      color: var(--neon-blue);
      border-color: rgba(0, 212, 255, 0.4);
      box-shadow: var(--glow-blue);
      background: rgba(0, 212, 255, 0.08);
      transform: translateY(-2px);
    }

    footer .github-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    footer .footer-meta {
      margin-top: 16px;
      font-size: 0.8rem;
      color: rgba(136, 136, 187, 0.4);
      letter-spacing: 1px;
    }

    footer .footer-meta .hearts {
      color: var(--neon-pink);
      animation: heartbeat 1.5s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }
    }

    /* ── Animations ── */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .container {
        padding: 20px 16px 60px;
      }

      header {
        padding: 40px 0 24px;
      }

      header h1 {
        font-size: 2rem;
      }

      header .logo-icon {
        font-size: 48px;
      }

      header .subtitle {
        font-size: 0.9rem;
        letter-spacing: 2px;
      }

      .description {
        padding: 20px;
      }

      .category-header {
        padding: 14px 16px;
      }

      .file-list-inner {
        padding-left: 60px;
        padding-right: 16px;
      }

      .category-header .icon {
        width: 34px;
        height: 34px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>

    // ── Generate Stars ──
    (function generateStars() {
      const container = document.getElementById('stars');
      const count = 120;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
        container.appendChild(star);
      }
    })();

    // ── Render Categories ──
    (function renderCategories() {
      const container = document.getElementById('categories');
      let totalFiles = 0;

      categories.forEach(cat => {
        totalFiles += cat.files.length;

        const div = document.createElement('div');
        div.className = `category ${cat.cls}`;

        const filePaths = cat.files.map(f => {
          const encodedName = f.replace(/ /g, '%20');
          return { name: f, path: cat.dir + encodedName };
        });

        div.innerHTML = `
      <div class="category-header" data-target="${cat.id}">
        <div class="left">
          <div class="icon">${cat.icon}</div>
          <div>
            <div class="name">${cat.name} <span class="name-en">· ${cat.nameEn}</span></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span class="count">${cat.files.length} 个文件</span>
          <span class="arrow">▼</span>
        </div>
      </div>
      <div class="file-list">
        <div class="file-list-inner">
          ${filePaths.map(f => `
            <a class="file-item" href="${f.path}" target="_blank">
              <span class="file-icon">📄</span>
              <span class="file-name">${f.name}</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;

        container.appendChild(div);
      });

      // Update stats
      document.getElementById('totalCats').textContent = categories.length;
      document.getElementById('totalFiles').textContent = totalFiles;

      // ── Toggle Logic ──
      container.addEventListener('click', (e) => {
        const header = e.target.closest('.category-header');
        if (!header) return;
        const catDiv = header.closest('.category');
        if (!catDiv) return;
        catDiv.classList.toggle('open');
      });
    })();
  </script>

</body>

</html>
